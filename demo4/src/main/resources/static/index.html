<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    /* 导航栏 */
    .navbar {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .navbar .logo {
      font-size: 20px;
      font-weight: 700;
      color: #1890ff;
    }
    .navbar .nav-links a {
      margin-left: 20px;
      padding: 8px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn-login-nav {
      color: #1890ff;
      border: 1px solid #1890ff;
    }
    .btn-login-nav:hover {
      background: #e6f7ff;
    }
    .btn-register-nav {
      background: #1890ff;
      color: #fff !important;
      border: 1px solid #1890ff;
    }
    .btn-register-nav:hover {
      background: #40a9ff;
      border-color: #40a9ff;
    }
    /* 已登录状态 */
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
    }
    .user-info .username {
      color: #333;
      font-weight: 600;
    }
    .user-info a {
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .btn-edit {
      color: #1890ff;
      border: 1px solid #1890ff;
    }
    .btn-edit:hover { background: #e6f7ff; }
    .btn-logout {
      color: #ff4d4f;
      border: 1px solid #ff4d4f;
    }
    .btn-logout:hover { background: #fff1f0; }

    /* 搜索框 */
    .search-box {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 20px;
      padding: 0 16px;
      height: 36px;
      transition: all 0.3s;
      border: 1px solid transparent;
    }
    .search-box:focus-within {
      background: #fff;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.1);
    }
    .search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      width: 200px;
      color: #333;
    }
    .search-box input::placeholder { color: #bbb; }
    .search-box .search-icon {
      color: #999;
      font-size: 14px;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .search-box .clear-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: #bbb;
      font-size: 16px;
      padding: 0 0 0 6px;
      display: none;
      line-height: 1;
    }
    .search-box .clear-btn:hover { color: #999; }

    /* 商品展示区 */
    .product-section {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .section-title {
      font-size: 22px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .product-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .product-card .img-wrap {
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: #f5f5f5;
    }
    .product-card .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-card .info {
      padding: 16px;
    }
    .product-card .info .name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-card .info .price {
      font-size: 18px;
      font-weight: 700;
      color: #ff4d4f;
    }
    .product-card .info .price::before {
      content: '¥';
      font-size: 14px;
    }
    .btn-add-cart {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 8px 0;
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-add-cart:hover { background: #ff7875; }
    .no-products {
      text-align: center;
      color: #999;
      font-size: 16px;
      padding: 60px 0;
    }

    /* 标题栏含切换按钮 */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .view-toggle {
      display: flex;
      gap: 4px;
      background: #fff;
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .view-toggle button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: #999;
      font-size: 16px;
      transition: all 0.2s;
    }
    .view-toggle button.active {
      background: #1890ff;
      color: #fff;
    }
    .view-toggle button:hover:not(.active) {
      background: #f0f0f0;
    }

    /* 列表模式 */
    .product-grid.list-mode {
      grid-template-columns: 1fr;
      gap: 16px;
    }
    .list-mode .product-card {
      display: flex;
      flex-direction: row;
    }
    .list-mode .product-card .img-wrap {
      width: 180px;
      min-width: 180px;
      height: 140px;
    }
    .list-mode .product-card .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px 24px;
    }
    .list-mode .product-card .info .name {
      font-size: 18px;
      margin-bottom: 10px;
      white-space: normal;
    }
    .list-mode .product-card .info .desc {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .list-mode .product-card .info .price {
      font-size: 20px;
    }
    /* 列表模式下购物车按钮 */
    .list-mode .product-card {
      flex-wrap: nowrap;
      align-items: center;
    }
    .list-mode .btn-add-cart {
      width: auto;
      min-width: 100px;
      margin: 0 20px 0 0;
      padding: 8px 18px;
      flex-shrink: 0;
      align-self: center;
      border-radius: 20px;
    }
    /* 网格模式下隐藏描述 */
    .product-card .info .desc {
      display: none;
    }
    .list-mode .product-card .info .desc {
      display: -webkit-box;
    }

  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Demo4</div>
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="searchInput" placeholder="搜索商品...">
      <button class="clear-btn" id="clearSearch">&times;</button>
    </div>
    <!-- 未登录 -->
    <div class="nav-links" id="guestNav">
      <a href="/login.html" class="btn-login-nav">登录</a>
      <a href="/register.html" class="btn-register-nav">注册</a>
    </div>
    <!-- 已登录 -->
    <div class="user-info" id="userNav" style="display:none;">
      <span class="username" id="displayName"></span>
      <a href="/product-upload.html" class="btn-edit">商品上传</a>
      <a href="/product-manage.html" class="btn-edit">商品管理</a>
      <a href="/cart.html" class="btn-edit">🛒 购物车</a>
      <a href="/orders.html" class="btn-edit">📦 我的订单</a>
      <a href="/change-password.html" class="btn-edit">修改密码</a>
      <a href="/logout" class="btn-logout">退出</a>
    </div>
  </nav>

  <div class="product-section">
    <div class="section-header">
      <div class="section-title">商品展示</div>
      <div class="view-toggle">
        <button id="gridBtn" class="active" title="网格模式">&#9638;</button>
        <button id="listBtn" title="列表模式">&#9776;</button>
      </div>
    </div>
    <div class="product-grid" id="productGrid">
      <div class="no-products" id="noProducts">暂无商品</div>
    </div>
  </div>

  <script>
    fetch('/api/currentUser')
      .then(r => r.json())
      .then(data => {
        if (data.loggedIn) {
          document.getElementById('guestNav').style.display = 'none';
          document.getElementById('userNav').style.display = 'flex';
          document.getElementById('displayName').textContent = data.username;
        }
      });

    // 视图切换
    const gridBtn = document.getElementById('gridBtn');
    const listBtn = document.getElementById('listBtn');
    const productGrid = document.getElementById('productGrid');

    gridBtn.addEventListener('click', function() {
      productGrid.classList.remove('list-mode');
      gridBtn.classList.add('active');
      listBtn.classList.remove('active');
    });
    listBtn.addEventListener('click', function() {
      productGrid.classList.add('list-mode');
      listBtn.classList.add('active');
      gridBtn.classList.remove('active');
    });

    // 商品数据
    let allProducts = [];

    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      const noProducts = document.getElementById('noProducts');
      grid.querySelectorAll('.product-card').forEach(el => el.remove());
      if (!products || products.length === 0) {
        noProducts.style.display = 'block';
        noProducts.textContent = searchInput.value ? '没有找到匹配的商品' : '暂无商品';
        return;
      }
      noProducts.style.display = 'none';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        const desc = p.description ? p.description.replace(/</g, '&lt;') : '';
        const stockText = p.stock != null ? p.stock : 0;
        card.innerHTML =
          '<div class="img-wrap"><img src="' + p.imagePath + '" alt="' + p.name.replace(/"/g, '&quot;') + '"></div>' +
          '<div class="info">' +
            '<div class="name">' + p.name.replace(/</g, '&lt;') + '</div>' +
            '<div class="desc">' + desc + '</div>' +
            '<div class="price">' + Number(p.price).toFixed(2) + '</div>' +
            '<div class="stock" style="font-size:13px;color:#888;margin-top:4px;">库存: ' + stockText + '</div>' +
          '</div>' +
          '<button class="btn-add-cart" onclick="addToCart(' + p.id + ', event)">加入购物车</button>';
        grid.appendChild(card);
      });
    }

    // 搜索
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');

    searchInput.addEventListener('input', function() {
      clearBtn.style.display = this.value ? 'block' : 'none';
      filterProducts();
    });
    clearBtn.addEventListener('click', function() {
      searchInput.value = '';
      clearBtn.style.display = 'none';
      filterProducts();
      searchInput.focus();
    });

    function filterProducts() {
      const keyword = searchInput.value.trim().toLowerCase();
      if (!keyword) {
        renderProducts(allProducts.slice(0, 9));
        return;
      }
      const filtered = allProducts.filter(p =>
        p.name.toLowerCase().includes(keyword) ||
        (p.description && p.description.toLowerCase().includes(keyword))
      );
      renderProducts(filtered);
    }

    // 加载商品列表
    fetch('/api/product/list')
      .then(r => r.json())
      .then(products => {
        allProducts = products || [];
        renderProducts(allProducts.slice(0, 9));
      });

    function addToCart(productId, e) {
      e.stopPropagation();
      fetch('/api/cart/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'productId=' + productId + '&quantity=1'
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const btn = e.target;
            btn.textContent = '✓ 已加入';
            btn.style.background = '#52c41a';
            setTimeout(() => { btn.textContent = '加入购物车'; btn.style.background = ''; }, 1500);
          } else {
            alert(data.message || '添加失败');
          }
        })
        .catch(() => alert('网络错误'));
    }
  </script>

</body>
</html>
