<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录成功</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .success-card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 380px;
      text-align: center;
    }
    .success-icon {
      font-size: 64px;
      color: #52c41a;
      margin-bottom: 20px;
    }
    .success-card h1 {
      color: #333;
      margin-bottom: 12px;
      font-size: 24px;
    }
    .success-card p {
      color: #666;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .btn-back {
      display: inline-block;
      padding: 10px 24px;
      background: #1890ff;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.3s;
    }
    .btn-back:hover {
      background: #40a9ff;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">&#10004;</div>
    <h1>登录成功！</h1>
    <p>欢迎回来，您已成功登录。</p>
    <a href="/" class="btn-back">返回主页</a>
  </div>
</body>
</html>
