<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人信息</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 440px;
    }
    .card h1 {
      text-align: center;
      margin-bottom: 8px;
      color: #333;
      font-size: 24px;
    }

    /* 角色徽章 */
    .role-bar {
      text-align: center;
      margin-bottom: 24px;
    }
    .role-badge {
      display: inline-block;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .role-USER { background: #e6f7ff; color: #1890ff; }
    .role-ADMIN { background: #fff1f0; color: #ff4d4f; }

    /* 信息展示区 */
    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #666;
    }
    .info-item:last-child { border-bottom: none; }
    .info-label { font-weight: 500; color: #333; }
    .info-section {
      background: #fafafa;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
    }

    /* 分区标题 */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #1890ff;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }
    .msg {
      text-align: center;
      margin-bottom: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    .msg.error { color: #ff4d4f; }
    .msg.success { color: #52c41a; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 4px;
    }
    .btn:hover { background: #40a9ff; }
    .links {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }
    .links a {
      color: #1890ff;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>👤 个人信息</h1>
    <div class="role-bar">
      <span class="role-badge" id="roleBadge"></span>
    </div>

    <!-- 基本信息展示 -->
    <div class="info-section">
      <div class="info-item">
        <span class="info-label">注册时间</span>
        <span id="createTime">-</span>
      </div>
    </div>

    <!-- 修改基本信息 -->
    <div class="section-title">修改基本信息</div>
    <div class="msg" id="profileMsg"></div>
    <form id="profileForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱">
      </div>
      <button type="submit" class="btn">保存信息</button>
    </form>

    <!-- 修改密码 -->
    <div class="section-title" style="margin-top:28px;">修改密码</div>
    <div class="msg" id="pwdMsg"></div>
    <form id="pwdForm">
      <div class="form-group">
        <label for="oldPassword">原密码</label>
        <input type="password" id="oldPassword" placeholder="请输入原密码" required>
      </div>
      <div class="form-group">
        <label for="newPassword">新密码</label>
        <input type="password" id="newPassword" placeholder="请输入新密码" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
      </div>
      <button type="submit" class="btn">确认修改密码</button>
    </form>

    <div class="links"><a href="/">返回主页</a></div>
  </div>

  <script>
    // 加载个人信息
    fetch('/api/profile')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) { window.location.href = '/login.html'; return; }
        document.getElementById('username').value = data.username || '';
        document.getElementById('email').value = data.email || '';
        var role = data.role || 'USER';
        var badge = document.getElementById('roleBadge');
        badge.textContent = role === 'ADMIN' ? '管理员' : '普通用户';
        badge.className = 'role-badge role-' + role;
        if (data.createTime) {
          document.getElementById('createTime').textContent = data.createTime.replace('T', ' ').substring(0, 19);
        }
      });

    // 保存基本信息
    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('profileMsg');
      var body = new URLSearchParams({
        username: document.getElementById('username').value,
        email: document.getElementById('email').value
      });
      fetch('/api/updateProfile', { method: 'POST', body: body })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          msgEl.className = 'msg ' + (data.success ? 'success' : 'error');
          msgEl.textContent = data.msg;
        });
    });

    // 修改密码
    document.getElementById('pwdForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('pwdMsg');
      var newPwd = document.getElementById('newPassword').value;
      var confirmPwd = document.getElementById('confirmPassword').value;
      if (newPwd !== confirmPwd) {
        msgEl.className = 'msg error';
        msgEl.textContent = '两次输入的新密码不一致';
        return;
      }
      var body = new URLSearchParams({
        oldPassword: document.getElementById('oldPassword').value,
        newPassword: newPwd
      });
      fetch('/api/changePassword', { method: 'POST', body: body })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          msgEl.className = 'msg ' + (data.success ? 'success' : 'error');
          msgEl.textContent = data.msg;
          if (data.success) document.getElementById('pwdForm').reset();
        });
    });
  </script>
</body>
</html>
