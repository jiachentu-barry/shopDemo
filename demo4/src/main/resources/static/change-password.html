<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 380px;
    }
    .card h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #555;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
    }
    .msg {
      text-align: center;
      margin-bottom: 16px;
      font-size: 13px;
      min-height: 20px;
    }
    .msg.error { color: #ff4d4f; }
    .msg.success { color: #52c41a; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #1890ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover { background: #40a9ff; }
    .links {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
    }
    .links a {
      color: #1890ff;
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>修改密码</h1>
    <div class="msg" id="msg"></div>
    <form id="form">
      <div class="form-group">
        <label for="oldPassword">原密码</label>
        <input type="password" id="oldPassword" name="oldPassword" placeholder="请输入原密码" required>
      </div>
      <div class="form-group">
        <label for="newPassword">新密码</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="请输入新密码" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">确认新密码</label>
        <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
      </div>
      <button type="submit" class="btn">确认修改</button>
    </form>
    <div class="links"><a href="/">返回主页</a></div>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      var msgEl = document.getElementById('msg');
      var newPwd = document.getElementById('newPassword').value;
      var confirmPwd = document.getElementById('confirmPassword').value;
      if (newPwd !== confirmPwd) {
        msgEl.className = 'msg error';
        msgEl.textContent = '两次输入的新密码不一致';
        return;
      }
      var body = new URLSearchParams({
        oldPassword: document.getElementById('oldPassword').value,
        newPassword: newPwd
      });
      fetch('/api/changePassword', { method: 'POST', body: body })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            msgEl.className = 'msg success';
            msgEl.textContent = data.msg;
            document.getElementById('form').reset();
          } else {
            msgEl.className = 'msg error';
            msgEl.textContent = data.msg;
          }
        });
    });
  </script>
</body>
</html>
