<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物车</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .header {
      background: #fff;
      padding: 16px 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 22px; color: #333; }
    .header a {
      color: #1890ff;
      text-decoration: none;
      font-size: 14px;
    }
    .container {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .cart-empty {
      text-align: center;
      padding: 80px 0;
      color: #999;
      font-size: 16px;
    }
    .cart-empty a {
      color: #1890ff;
      text-decoration: none;
    }
    .cart-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .cart-item .checkbox-col {
      flex-shrink: 0;
    }
    .cart-item .checkbox-col input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #eee;
      flex-shrink: 0;
    }
    .cart-item .info {
      flex: 1;
      min-width: 0;
    }
    .cart-item .info .name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cart-item .info .desc {
      font-size: 13px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cart-item .price {
      font-size: 18px;
      font-weight: 700;
      color: #ff4d4f;
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }
    .cart-item .price::before { content: '¥'; font-size: 13px; }
    .cart-item .qty {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }
    .qty button {
      width: 30px;
      height: 30px;
      border: 1px solid #d9d9d9;
      background: #fafafa;
      cursor: pointer;
      font-size: 16px;
      line-height: 28px;
      text-align: center;
      transition: all 0.2s;
      color: #333;
    }
    .qty button:hover { background: #e6f7ff; border-color: #1890ff; }
    .qty button:disabled { color: #ccc; cursor: not-allowed; background: #f5f5f5; }
    .qty button:first-child { border-radius: 4px 0 0 4px; }
    .qty button:last-child { border-radius: 0 4px 4px 0; }
    .qty input {
      width: 44px;
      height: 30px;
      text-align: center;
      border: 1px solid #d9d9d9;
      border-left: none;
      border-right: none;
      font-size: 14px;
      outline: none;
    }
    .cart-item .subtotal {
      font-size: 16px;
      font-weight: 700;
      color: #333;
      white-space: nowrap;
      min-width: 100px;
      text-align: right;
    }
    .cart-item .subtotal::before { content: '¥'; font-size: 12px; color: #999; }
    .cart-item .remove-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .cart-item .remove-btn:hover { color: #ff4d4f; }

    /* 底部结算栏 */
    .cart-footer {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      position: sticky;
      bottom: 16px;
    }
    .cart-footer .left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .cart-footer .select-all-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #555;
    }
    .cart-footer .select-all-label input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .cart-footer .clear-btn {
      background: none;
      border: none;
      color: #999;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }
    .cart-footer .clear-btn:hover { color: #ff4d4f; }
    .cart-footer .right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .cart-footer .total-info {
      font-size: 14px;
      color: #666;
    }
    .cart-footer .total-info .count { color: #1890ff; font-weight: 600; }
    .cart-footer .total-price {
      font-size: 22px;
      font-weight: 700;
      color: #ff4d4f;
    }
    .cart-footer .total-price::before { content: '¥'; font-size: 14px; }
    .cart-footer .checkout-btn {
      padding: 10px 32px;
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .cart-footer .checkout-btn:hover { background: #ff7875; }
    .cart-footer .checkout-btn:disabled { background: #d9d9d9; cursor: not-allowed; }

    .msg {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      z-index: 2000;
      color: #fff;
      transition: opacity 0.3s;
    }
    .msg-success { background: #52c41a; }
    .msg-error { background: #ff4d4f; }
    .login-tip {
      text-align: center;
      padding: 80px 0;
      color: #999;
      font-size: 16px;
    }
    .login-tip a {
      color: #1890ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛒 我的购物车</h1>
    <a href="/">← 继续购物</a>
  </div>

  <div class="container">
    <div id="loginTip" class="login-tip" style="display:none;">
      请先 <a href="/login.html">登录</a> 后查看购物车
    </div>
    <div id="cartEmpty" class="cart-empty" style="display:none;">
      购物车空空如也～ <a href="/">去逛逛</a>
    </div>
    <div id="cartList"></div>
    <div id="cartFooter" class="cart-footer" style="display:none;">
      <div class="left">
        <label class="select-all-label">
          <input type="checkbox" id="selectAll" checked> 全选
        </label>
        <button class="clear-btn" onclick="clearCart()">清空购物车</button>
      </div>
      <div class="right">
        <span class="total-info">已选 <span class="count" id="selectedCount">0</span> 件</span>
        <span class="total-price" id="totalPrice">0.00</span>
        <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">去结算</button>
      </div>
    </div>
  </div>

  <script>
    let cartItems = [];
    let selectedIds = new Set();

    function showMsg(text, type) {
      const el = document.createElement('div');
      el.className = 'msg msg-' + type;
      el.textContent = text;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; }, 2000);
      setTimeout(() => { el.remove(); }, 2500);
    }

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function loadCart() {
      fetch('/api/cart/list')
        .then(r => r.json())
        .then(data => {
          if (!data.success) {
            document.getElementById('loginTip').style.display = 'block';
            return;
          }
          cartItems = data.items || [];
          if (cartItems.length === 0) {
            document.getElementById('cartEmpty').style.display = 'block';
            document.getElementById('cartFooter').style.display = 'none';
            document.getElementById('cartList').innerHTML = '';
            return;
          }
          // 默认全选
          selectedIds = new Set(cartItems.map(i => i.productId));
          document.getElementById('cartEmpty').style.display = 'none';
          document.getElementById('cartFooter').style.display = 'flex';
          renderCart();
        })
        .catch(() => showMsg('加载失败', 'error'));
    }

    function renderCart() {
      const list = document.getElementById('cartList');
      list.innerHTML = cartItems.map(item => {
        const p = item.product || {};
        const checked = selectedIds.has(item.productId) ? 'checked' : '';
        const subtotal = (Number(p.price || 0) * item.quantity).toFixed(2);
        return `
          <div class="cart-item" data-pid="${item.productId}">
            <div class="checkbox-col">
              <input type="checkbox" ${checked} onchange="toggleSelect(${item.productId}, this.checked)">
            </div>
            <img src="${p.imagePath || ''}" alt="${escapeHtml(p.name)}">
            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="desc">${escapeHtml(p.description)}</div>
            </div>
            <div class="price">${Number(p.price || 0).toFixed(2)}</div>
            <div class="qty">
              <button onclick="changeQty(${item.productId}, -1)" ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
              <input type="text" value="${item.quantity}" readonly>
              <button onclick="changeQty(${item.productId}, 1)">+</button>
            </div>
            <div class="subtotal">${subtotal}</div>
            <button class="remove-btn" onclick="removeItem(${item.productId})" title="删除">&times;</button>
          </div>`;
      }).join('');
      updateTotal();
    }

    function toggleSelect(productId, checked) {
      if (checked) selectedIds.add(productId);
      else selectedIds.delete(productId);
      document.getElementById('selectAll').checked = selectedIds.size === cartItems.length;
      updateTotal();
    }

    document.getElementById('selectAll').addEventListener('change', function() {
      if (this.checked) {
        selectedIds = new Set(cartItems.map(i => i.productId));
      } else {
        selectedIds.clear();
      }
      document.querySelectorAll('.cart-item input[type="checkbox"]').forEach(cb => cb.checked = this.checked);
      updateTotal();
    });

    function updateTotal() {
      let count = 0, total = 0;
      cartItems.forEach(item => {
        if (selectedIds.has(item.productId)) {
          count += item.quantity;
          total += Number(item.product?.price || 0) * item.quantity;
        }
      });
      document.getElementById('selectedCount').textContent = count;
      document.getElementById('totalPrice').textContent = total.toFixed(2);
      document.getElementById('checkoutBtn').disabled = count === 0;
    }

    function changeQty(productId, delta) {
      const item = cartItems.find(i => i.productId === productId);
      if (!item) return;
      const newQty = item.quantity + delta;
      if (newQty < 1) return;

      fetch('/api/cart/update?productId=' + productId + '&quantity=' + newQty, { method: 'PUT' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            item.quantity = newQty;
            renderCart();
          } else {
            showMsg(data.message, 'error');
          }
        });
    }

    function removeItem(productId) {
      if (!confirm('确定要移除该商品吗？')) return;
      fetch('/api/cart/remove?productId=' + productId, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            cartItems = cartItems.filter(i => i.productId !== productId);
            selectedIds.delete(productId);
            if (cartItems.length === 0) {
              document.getElementById('cartEmpty').style.display = 'block';
              document.getElementById('cartFooter').style.display = 'none';
              document.getElementById('cartList').innerHTML = '';
            } else {
              renderCart();
            }
            showMsg('已移除', 'success');
          }
        });
    }

    function clearCart() {
      if (!confirm('确定要清空购物车吗？')) return;
      fetch('/api/cart/clear', { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            cartItems = [];
            selectedIds.clear();
            document.getElementById('cartEmpty').style.display = 'block';
            document.getElementById('cartFooter').style.display = 'none';
            document.getElementById('cartList').innerHTML = '';
            showMsg('已清空', 'success');
          }
        });
    }

    function checkout() {
      const items = cartItems.filter(i => selectedIds.has(i.productId));
      if (items.length === 0) {
        showMsg('请至少选择一件商品', 'error');
        return;
      }
      const btn = document.getElementById('checkoutBtn');
      btn.disabled = true;
      btn.textContent = '提交中...';

      fetch('/api/order/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productIds: items.map(i => i.productId) })
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            window.location.href = '/order-detail.html?orderNo=' + data.orderNo;
          } else {
            showMsg(data.message || '下单失败', 'error');
            btn.disabled = false;
            btn.textContent = '去结算';
          }
        })
        .catch(() => {
          showMsg('网络错误', 'error');
          btn.disabled = false;
          btn.textContent = '去结算';
        });
    }

    loadCart();
  </script>
</body>
</html>
